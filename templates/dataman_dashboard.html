{% extends "base.html" %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/reports.css') }}" rel="stylesheet">

<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h1 class="h3 mb-0"><i class="bi bi-gear-wide-connected me-2"></i>Dataman — Reconciliation</h1>
    <div class="text-muted">Review Store, Van 2 and Van 3 separately — inspect bank entries, expenses and versions.</div>
  </div>

  <div class="d-flex gap-2 align-items-end">
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('index') }}"><i class="bi bi-journal-plus me-1"></i>Register Sales</a>
    <div>
      <label class="form-label small mb-1">Start</label>
      <input id="start" type="date" class="form-control form-control-sm" value="{{ today }}">
    </div>
    <div>
      <label class="form-label small mb-1">End</label>
      <input id="end" type="date" class="form-control form-control-sm" value="{{ today }}">
    </div>
    <div>
      <button id="loadSummary" class="btn btn-primary btn-sm"><i class="bi bi-arrow-repeat me-1"></i>Load</button>
    </div>
  </div>
</div>

<div id="summaryArea" class="row g-3"></div>

<!-- Versions modal (shared) -->
<div class="modal fade" id="versionsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 id="versionsModalTitle" class="modal-title"><i class="bi bi-journal-text me-1"></i>Versions</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="versionsListArea"></div>
      </div>
    </div>
  </div>
</div>

<!-- Correction modal (shared) -->
<div class="modal fade" id="correctionModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 id="correctionModalTitle" class="modal-title"><i class="bi bi-pencil-square me-1"></i>Create Correction</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="correctionForm" class="row g-2">
          <input type="hidden" id="corr_date">
          <input type="hidden" id="corr_place">
          <input type="hidden" id="corr_prev">

          <div class="col-12 col-md-6">
            <label class="form-label">Total sales</label>
            <input id="corr_total_sales" type="number" step="0.01" class="form-control">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Cash total</label>
            <input id="corr_cash_total" type="number" step="0.01" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label">Note</label>
            <textarea id="corr_note" class="form-control" rows="3"></textarea>
          </div>

          <div class="col-12">
            <label class="form-label">Bank entries JSON (optional)</label>
            <textarea id="corr_bank_entries" class="form-control" rows="4" placeholder='[{"bank":"Awash","amount":100}, ...]'></textarea>
          </div>

          <div class="col-12 text-end">
            <button id="submitCorrectionBtn" class="btn btn-primary"><i class="bi bi-save me-1"></i>Submit Correction</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/reports.js') }}"></script>
{% endblock %}
