{% extends "base.html" %}
{% block content %}
<link href="{{ url_for('static', filename='css/reports.css') }}" rel="stylesheet">

<script>
  // expose current user info to the page script
  window.CURRENT_USER = {
    role: "{{ tmpl_user.role if tmpl_user else '' }}",
    place: "{{ tmpl_user.place if tmpl_user else '' }}",
    username: "{{ tmpl_user.username if tmpl_user else '' }}"
  };
</script>

<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h2 class="h4 mb-0"><i class="bi bi-list-task me-2"></i>Sales & Reports</h2>
    <div class="text-muted small">Vans can view their registered sales, bank payments and expenses.</div>
  </div>

  <div class="d-flex gap-2 align-items-end">
    <div>
      <label class="form-label small mb-1">Start</label>
      <input id="start" type="date" class="form-control form-control-sm" value="{{ today }}">
    </div>
    <div>
      <label class="form-label small mb-1">End</label>
      <input id="end" type="date" class="form-control form-control-sm" value="{{ today }}">
    </div>
    <div>
      <label class="form-label small mb-1">Place</label>
      <select id="filterPlace" class="form-select form-select-sm">
        <option value="">All</option>
        {% for p in places %}
        <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <button id="loadSales" class="btn btn-primary btn-sm"><i class="bi bi-arrow-repeat me-1"></i>Load</button>
    </div>
  </div>
</div>

<div id="topSummary" class="row g-3 mb-3"></div>

<div id="salesResults" class="row g-3"></div>

<!-- Modals for details -->
<div class="modal fade" id="salesModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 id="salesModalTitle" class="modal-title">Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="salesModalBody"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/sales_list.js') }}"></script>
{% endblock %}
